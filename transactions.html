<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions — SmartFarm</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="shell">
  <div id="app-shell"></div>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/nav.js"></script>
  <script>
  SF.requireLogin();
  buildNav('Transactions', 'dashboard');

  const pc = document.getElementById('page-content');
  let filterType = '';

  function render() {
    let trans = SF.getTransactions();
    if (filterType) trans = trans.filter(t=>t.type===filterType);
    trans.sort((a,b)=>new Date(b.date)-new Date(a.date));

    const allT    = SF.getTransactions();
    const income  = allT.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense = allT.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

    pc.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <h2 style="font-size:22px;font-weight:800">💳 Transactions</h2>
    </div>

    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">
      <div class="stat-card" style="text-align:center">
        <div class="stat-value" style="color:var(--green-600)">${SF.currency(income)}</div>
        <div class="stat-label">Total Income</div>
      </div>
      <div class="stat-card" style="text-align:center">
        <div class="stat-value" style="color:var(--red-600)">${SF.currency(expense)}</div>
        <div class="stat-label">Total Expenses</div>
      </div>
      <div class="stat-card" style="text-align:center">
        <div class="stat-value" style="color:${(income-expense)>=0?'var(--green-700)':'var(--red-600)'}">${SF.currency(income-expense)}</div>
        <div class="stat-label">Net Profit</div>
      </div>
    </div>

    <!-- Add Form -->
    <div class="card" style="margin-bottom:20px">
      <div class="card-header"><h3>➕ Add Transaction</h3></div>
      <div class="card-body">
        <div class="form-grid" style="margin-bottom:12px">
          <div class="form-group"><label class="form-label">Type</label>
            <select id="tType" class="form-select">
              <option value="income">💚 Income</option>
              <option value="expense">❤ Expense</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">Category <span class="req">*</span></label>
            <input type="text" id="tCat" class="form-input" placeholder="e.g. Milk Sale, Feed Cost"></div>
          <div class="form-group"><label class="form-label">Amount (₦) <span class="req">*</span></label>
            <input type="number" id="tAmount" class="form-input" step="0.01" placeholder="0.00"></div>
          <div class="form-group"><label class="form-label">Date</label>
            <input type="date" id="tDate" class="form-input" value="${new Date().toISOString().slice(0,10)}"></div>
          <div class="form-group" style="grid-column:1/-1"><label class="form-label">Description</label>
            <input type="text" id="tDesc" class="form-input" placeholder="Optional notes"></div>
        </div>
        <button onclick="addTrans()" class="btn btn-primary">💾 Save Transaction</button>
      </div>
    </div>

    <!-- Filter + List -->
    <div class="card">
      <div style="display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--gray-100);flex-wrap:wrap">
        ${[['','All'],['income','Income'],['expense','Expenses']].map(([v,l])=>`
          <button onclick="setFilter('${v}')" style="padding:6px 14px;border-radius:99px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:${filterType===v?'var(--green-100)':'var(--gray-100)'};color:${filterType===v?'var(--green-700)':'var(--gray-500)'}">${l}</button>
        `).join('')}
        <span style="margin-left:auto;font-size:12px;color:var(--gray-400)">${trans.length} records</span>
      </div>
      ${!trans.length?`<div class="empty-state" style="padding:40px"><div class="empty-icon">💳</div><p>No transactions yet.</p></div>`:
        trans.map(t=>`
        <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--gray-50)">
          <div style="width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;background:${t.type==='income'?'var(--green-100)':'var(--red-100)'}; color:${t.type==='income'?'var(--green-700)':'var(--red-600)'}">
            ${t.type==='income'?'+':'-'}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description||t.category}</div>
            <div style="font-size:11px;color:var(--gray-400)">${SF.fmtDate(t.date)} · ${t.category}</div>
          </div>
          <span style="font-weight:800;font-size:14px;color:${t.type==='income'?'var(--green-700)':'var(--red-600)'}">
            ${t.type==='income'?'+':'-'}${SF.currency(t.amount)}
          </span>
        </div>`).join('')}
    </div>
    `;
  }

  function setFilter(v) { filterType=v; render(); }

  function addTrans() {
    const cat    = document.getElementById('tCat').value.trim();
    const amount = +document.getElementById('tAmount').value;
    if (!cat || !amount) { SF.toast('Category and amount required.','error'); return; }
    SF.addTransaction({
      type:        document.getElementById('tType').value,
      category:    cat,
      amount,
      description: document.getElementById('tDesc').value.trim(),
      date:        document.getElementById('tDate').value,
    });
    SF.toast('Transaction saved!');
    render();
  }

  render();
  </script>
</body>
</html>

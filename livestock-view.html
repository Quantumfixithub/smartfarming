<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Animal Profile — SmartFarm</title>
<link rel="stylesheet" href="assets/css/app.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="shell"><div id="app-shell"></div>
<script src="assets/js/app.js"></script><script src="assets/js/nav.js"></script>
<script>
SF.requireLogin();
const id=+SF.param('id');
const a=SF.getAnimal(id);
if(!a){window.location.href='livestock.html';}
buildShell(a.name||a.tagId,'livestock');
const pc=document.getElementById('page-content');

function age(dob){if(!dob)return'—';const d=new Date(dob),n=new Date();const yr=n.getFullYear()-d.getFullYear(),mo=n.getMonth()-d.getMonth();return yr>0?yr+'yr '+(mo<0?mo+12:mo)+'mo':Math.abs(mo)+' months';}

function render(activeTab='logs'){
  const logs   =SF.getAnimalLogs(id).sort((a,b)=>new Date(b.logDate)-new Date(a.logDate));
  const health =SF.getHealthRecords(id).sort((a,b)=>new Date(b.dateGiven)-new Date(a.dateGiven));
  const wData  =logs.filter(l=>l.weight>0).slice().reverse();
  const chipMap={healthy:'chip-ok',sick:'chip-bad',recovering:'chip-warn',deceased:'chip-bad'};
  const qrUrl  =`https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(location.href)}`;

  pc.innerHTML=`
  <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3);margin-bottom:16px;flex-wrap:wrap">
    <a href="dashboard.html" style="color:var(--green-t);font-weight:700;text-decoration:none">Dashboard</a> ›
    <a href="livestock.html" style="color:var(--green-t);font-weight:700;text-decoration:none">Herd</a> ›
    <span>${a.name||a.tagId}</span>
  </div>

  <div class="grid-2" style="margin-bottom:14px">
    <!-- Profile Card -->
    <div style="display:grid;grid-template-columns:200px 1fr;gap:14px">
      <div class="panel" style="text-align:center;padding:20px">
        <div style="font-size:52px;margin-bottom:6px">${SF.animalIcon(a.type)}</div>
        <div style="font-size:16px;font-weight:800">${a.name||'Unnamed'}</div>
        <div class="monospace" style="font-size:11px;color:var(--text3);margin-top:2px">${a.tagId}</div>
        <div style="margin:10px 0"><span class="chip ${chipMap[a.healthStatus]||'chip-gray'}">${a.healthStatus}</span></div>
        <img src="${qrUrl}" alt="QR" style="width:90px;height:90px;border-radius:8px;border:1px solid var(--border);margin:8px auto;display:block">
        <div style="font-size:10px;color:var(--text3)">Scan to open profile</div>
        <div style="margin-top:12px">
          <label class="form-label" style="text-align:left;display:block;margin-bottom:5px">Update Health</label>
          <select class="form-select" style="font-size:11px;padding:6px 10px" onchange="updateHealth(this.value)">
            ${['healthy','sick','recovering','deceased'].map(s=>`<option value="${s}" ${a.healthStatus===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">
          <a href="livestock-edit.html?id=${a.id}" class="btn btn-sm btn-block">✏ Edit Animal</a>
        </div>
      </div>

      <!-- Details -->
      <div class="panel">
        <div class="ph"><span class="ph-title">Animal Details</span></div>
        <div style="padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px">
          ${[['Type',a.type],['Breed',a.breed||'—'],['Gender',a.gender],['Age',age(a.dob)],
             ['Weight',a.weight?a.weight+'kg':'—'],['Color',a.color||'—'],
             ['Source',a.source||'—'],['Purchase',SF.currency(a.purchasePrice)],
             ['Value',SF.currency(a.currentValue)],['Reproductive',a.reproductiveStatus||'—']
            ].map(([l,v])=>`<div style="background:var(--surf2);border-radius:var(--radius);padding:10px;border:1px solid var(--border)">
              <div class="monospace" style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">${l}</div>
              <div style="font-size:13px;font-weight:700;text-transform:capitalize">${v}</div>
            </div>`).join('')}
        </div>
        ${a.notes?`<div style="margin:0 14px 14px;padding:10px 12px;background:var(--blue-l);border-radius:var(--radius);font-size:12px;color:var(--text2);border:1px solid var(--blue-m)">📝 ${a.notes}</div>`:''}
      </div>
    </div>

    <!-- Weight Chart -->
    <div>
      ${wData.length>1?`<div class="panel" style="margin-bottom:14px">
        <div class="ph"><span class="ph-title">⚖ Weight Trend</span><span class="ph-meta">${wData.length} data points</span></div>
        <div style="padding:14px"><canvas id="weightChart" height="140"></canvas></div>
      </div>`:''}
      <div class="panel">
        <div class="ph"><span class="ph-title">Quick Stats</span></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr)">
          ${[['Logs',logs.length,'📋'],['Health Rec.',health.length,'💉'],['Milk/Eggs',logs.filter(l=>l.milkYield>0||l.eggCount>0).length,'🥛']].map(([l,v,i])=>
            `<div style="text-align:center;padding:14px;border-right:1px solid var(--border)">
              <div style="font-size:20px">${i}</div>
              <div style="font-size:18px;font-weight:800;margin-top:5px">${v}</div>
              <div class="monospace" style="font-size:10px;color:var(--text3)">${l}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="panel">
    <div style="display:flex;border-bottom:1px solid var(--border);padding:0 4px;overflow-x:auto">
      ${[['logs','📋 Daily Logs'],['health','💉 Health Records'],['add-log','➕ Add Log'],['add-health','🏥 Add Health']].map(([k,l])=>
        `<button class="tab-btn-${k}" style="padding:10px 16px;font-size:12px;font-weight:700;color:${activeTab===k?'var(--green-t)':'var(--text3)'};background:none;border:none;border-bottom:${activeTab===k?'2.5px solid var(--green)':'2.5px solid transparent'};margin-bottom:-1px;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:.15s" onclick="switchTab('${k}')">${l}</button>`
      ).join('')}
    </div>

    <div id="pane-logs" style="display:${activeTab==='logs'?'block':'none'}">
      ${!logs.length?`<div class="empty"><div class="empty-ico">📋</div><h3>No Logs Yet</h3><p>Click "Add Log" to start daily tracking.</p></div>`:
      `<div style="overflow-x:auto"><table class="tbl">
        <thead><tr><th>Date</th><th>Weight</th>${['cow','goat'].includes(a.type)?'<th>Milk (L)</th>':''}${a.type==='poultry'?'<th>Eggs</th>':''}<th>Feed (kg)</th><th>Temp °C</th><th>Notes</th></tr></thead>
        <tbody>${logs.map(l=>`<tr>
          <td class="monospace">${SF.fmtDate(l.logDate)}</td>
          <td><strong>${l.weight?l.weight+' kg':'—'}</strong></td>
          ${['cow','goat'].includes(a.type)?`<td style="color:var(--blue)">${l.milkYield>0?l.milkYield+'L':'—'}</td>`:''}
          ${a.type==='poultry'?`<td style="color:var(--amber)">${l.eggCount>0?l.eggCount:'—'}</td>`:''}
          <td>${l.feedIntake>0?l.feedIntake+'kg':'—'}</td>
          <td class="monospace ${l.temperature>39.5?'text-bad':''}">${l.temperature>0?l.temperature+'°C':'—'}</td>
          <td style="color:var(--text3);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.notes||'—'}</td>
        </tr>`).join('')}</tbody>
      </table></div>`}
    </div>

    <div id="pane-health" style="display:${activeTab==='health'?'block':'none'}">
      ${!health.length?`<div class="empty"><div class="empty-ico">💉</div><h3>No Health Records</h3><p>Add vaccination and treatment records here.</p></div>`:
      `<table class="tbl"><thead><tr><th>Type</th><th>Vaccine/Meds</th><th>Date Given</th><th>Next Due</th><th>Vet</th><th>Cost</th></tr></thead>
      <tbody>${health.map(h=>`<tr>
        <td><span class="chip chip-blue">${h.recordType}</span></td>
        <td><strong>${h.vaccineName||'—'}</strong></td>
        <td class="monospace">${SF.fmtDate(h.dateGiven)}</td>
        <td class="monospace ${h.nextDue&&SF.daysUntil(h.nextDue)<=7?'text-warn':''}">${h.nextDue?SF.fmtDate(h.nextDue):'—'}</td>
        <td>${h.vetName||'—'}</td>
        <td class="monospace">${h.cost?SF.currency(h.cost):'—'}</td>
      </tr>`).join('')}</tbody></table>`}
    </div>

    <div id="pane-add-log" style="display:${activeTab==='add-log'?'block':'none'};padding:20px">
      <div style="max-width:500px">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Date</label><input type="date" id="ld" class="form-input" value="${new Date().toISOString().slice(0,10)}"></div>
          <div class="form-group"><label class="form-label">Weight (kg)</label><input type="number" id="lw" class="form-input" step="0.01" placeholder="0.00"></div>
          ${['cow','goat'].includes(a.type)?'<div class="form-group"><label class="form-label">Milk Yield (L)</label><input type="number" id="lm" class="form-input" step="0.01" placeholder="0.00"></div>':''}
          ${a.type==='poultry'?'<div class="form-group"><label class="form-label">Egg Count</label><input type="number" id="le" class="form-input" placeholder="0"></div>':''}
          <div class="form-group"><label class="form-label">Feed Intake (kg)</label><input type="number" id="lf" class="form-input" step="0.01" placeholder="0.00"></div>
          <div class="form-group"><label class="form-label">Temperature (°C)</label><input type="number" id="lt" class="form-input" step="0.1" placeholder="38.5"></div>
          <div class="form-group form-span-2"><label class="form-label">Notes</label><textarea id="ln" class="form-textarea" placeholder="Today's observations…"></textarea></div>
        </div>
        <div style="margin-top:14px;display:flex;gap:10px">
          <button onclick="saveLog()" class="btn btn-primary">💾 Save Log</button>
          <button onclick="switchTab('logs')" class="btn">Cancel</button>
        </div>
      </div>
    </div>

    <div id="pane-add-health" style="display:${activeTab==='add-health'?'block':'none'};padding:20px">
      <div style="max-width:500px">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Record Type</label>
            <select id="ht" class="form-select"><option value="vaccination">💉 Vaccination</option><option value="treatment">💊 Treatment</option><option value="checkup">🩺 Checkup</option><option value="deworming">🪱 Deworming</option></select>
          </div>
          <div class="form-group"><label class="form-label">Vaccine / Medicine</label><input type="text" id="hn" class="form-input" placeholder="e.g. FMD Vaccine"></div>
          <div class="form-group"><label class="form-label">Date Given</label><input type="date" id="hd" class="form-input" value="${new Date().toISOString().slice(0,10)}"></div>
          <div class="form-group"><label class="form-label">Next Due Date</label><input type="date" id="hnd" class="form-input"></div>
          <div class="form-group"><label class="form-label">Vet Name</label><input type="text" id="hv" class="form-input" placeholder="Dr. Emeka"></div>
          <div class="form-group"><label class="form-label">Cost (₦)</label><input type="number" id="hc" class="form-input" value="0" step="0.01"></div>
          <div class="form-group form-span-2"><label class="form-label">Notes</label><textarea id="hnotes" class="form-textarea"></textarea></div>
        </div>
        <div style="margin-top:14px;display:flex;gap:10px">
          <button onclick="saveHealthRec()" class="btn btn-primary">💾 Save Record</button>
          <button onclick="switchTab('health')" class="btn">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  `;

  // Weight chart
  if(wData.length>1){
    new Chart(document.getElementById('weightChart').getContext('2d'),{
      type:'line',data:{labels:wData.map(l=>SF.fmtDateShort(l.logDate)),
        datasets:[{label:'Weight (kg)',data:wData.map(l=>l.weight),borderColor:'var(--green)',backgroundColor:'rgba(45,122,58,.08)',borderWidth:2,fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'var(--green)'}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,ticks:{font:{family:'IBM Plex Mono',size:10}}},x:{grid:{display:false},ticks:{font:{family:'IBM Plex Mono',size:10}}}}}
    });
  }
}

function switchTab(t){
  ['logs','health','add-log','add-health'].forEach(k=>{
    document.getElementById('pane-'+k).style.display=t===k?'block':'none';
    const btn=document.querySelector('.tab-btn-'+k);
    if(btn){btn.style.color=t===k?'var(--green-t)':'var(--text3)';btn.style.borderBottomColor=t===k?'var(--green)':'transparent';}
  });
}
window.switchTab=switchTab;

function updateHealth(val){a.healthStatus=val;SF.saveAnimal(a);SF.toast('Status updated!');render();}
window.updateHealth=updateHealth;

function saveLog(){
  SF.addAnimalLog({animalId:id,logDate:document.getElementById('ld').value,
    weight:+document.getElementById('lw').value||0,
    milkYield:+document.getElementById('lm')?.value||0,
    eggCount:+document.getElementById('le')?.value||0,
    feedIntake:+document.getElementById('lf').value||0,
    temperature:+document.getElementById('lt').value||0,
    notes:document.getElementById('ln').value.trim(),
  });
  SF.toast('Log saved!');render('logs');
}
window.saveLog=saveLog;

function saveHealthRec(){
  SF.addHealthRecord({animalId:id,recordType:document.getElementById('ht').value,
    vaccineName:document.getElementById('hn').value.trim(),
    vetName:document.getElementById('hv').value.trim(),
    dateGiven:document.getElementById('hd').value,
    nextDue:document.getElementById('hnd').value||null,
    cost:+document.getElementById('hc').value||0,
    notes:document.getElementById('hnotes').value.trim(),
  });
  SF.toast('Health record saved!');render('health');
}
window.saveHealthRec=saveHealthRec;

render();
</script></body></html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — SmartFarm</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🌾</div>
      <h1>SmartFarm</h1>
      <p>Create your farm account</p>
    </div>

    <h2>Create Account</h2>

    <div id="error-msg" class="alert alert-error" style="display:none"></div>

    <div class="form-group">
      <label class="form-label">Full Name <span class="req">*</span></label>
      <input type="text" id="name" class="form-input" placeholder="John Doe">
    </div>
    <div class="form-group">
      <label class="form-label">Email Address <span class="req">*</span></label>
      <input type="email" id="email" class="form-input" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="form-label">Farm Name</label>
      <input type="text" id="farmName" class="form-input" placeholder="My Green Farm">
    </div>
    <div class="form-group">
      <label class="form-label">Password <span class="req">*</span></label>
      <input type="password" id="password" class="form-input" placeholder="Min. 6 characters">
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password <span class="req">*</span></label>
      <input type="password" id="confirm" class="form-input" placeholder="Repeat password">
    </div>

    <button onclick="doRegister()" class="btn btn-primary btn-block">
      ✚ Create Account
    </button>

    <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--gray-400)">
      Already have an account? <a href="login.html" style="color:var(--green-600);font-weight:700">Sign in</a>
    </p>
  </div>

  <script src="assets/js/app.js"></script>
  <script>
    if (SF.session()) window.location.href = 'dashboard.html';

    function doRegister() {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const farmName = document.getElementById('farmName').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const errEl    = document.getElementById('error-msg');
      errEl.style.display = 'none';

      if (!name || !email || !password) { showErr('Please fill in all required fields.'); return; }
      if (password !== confirm) { showErr('Passwords do not match.'); return; }
      if (password.length < 6) { showErr('Password must be at least 6 characters.'); return; }

      const result = SF.register(name, email, password, farmName);
      if (result.ok) {
        SF.login(email, password);
        window.location.href = 'dashboard.html';
      } else {
        showErr(result.msg);
      }
    }

    function showErr(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'flex';
    }
  </script>
</body>
</html>

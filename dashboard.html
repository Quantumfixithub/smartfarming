<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard — SmartFarm</title>
  <link rel="stylesheet" href="assets/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="shell">
<div id="app-shell"></div>
<script src="assets/js/app.js"></script>
<script src="assets/js/nav.js"></script>
<script>
SF.requireLogin();
buildShell('Dashboard','dashboard');

const pc  = document.getElementById('page-content');
const s   = SF.session();
const animals  = SF.getAnimals().filter(a=>a.isActive!==false);
const plots    = SF.getPlots();
const trans    = SF.getTransactions();
const healthDue= SF.getUpcomingHealth();

const totalIncome  = trans.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
const totalExpense = trans.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
const netProfit    = totalIncome - totalExpense;
const liveValue    = animals.reduce((s,a)=>s+(+a.currentValue||0),0);
const sick         = animals.filter(a=>a.healthStatus==='sick').length;
const healthy      = animals.filter(a=>a.healthStatus==='healthy').length;
const totalHa      = plots.reduce((s,p)=>s+(+p.sizeHectare||0),0);

// Monthly chart data
const mLabels=[],mInc=[],mExp=[];
for(let i=5;i>=0;i--){
  const d=new Date();d.setMonth(d.getMonth()-i);
  const ym=d.toISOString().slice(0,7);
  mLabels.push(d.toLocaleString('default',{month:'short'}));
  mInc.push(trans.filter(t=>t.type==='income'&&t.date?.startsWith(ym)).reduce((s,t)=>s+t.amount,0));
  mExp.push(trans.filter(t=>t.type==='expense'&&t.date?.startsWith(ym)).reduce((s,t)=>s+t.amount,0));
}

const animalRows = animals.slice(0,6).map(a=>{
  const chipMap={healthy:'chip-ok',sick:'chip-bad',recovering:'chip-warn',deceased:'chip-bad'};
  return `<tr onclick="window.location.href='livestock-view.html?id=${a.id}'">
    <td><div class="animal-ico">${SF.animalIcon(a.type)}</div></td>
    <td><strong>${a.tagId}</strong> ${a.name||''}</td>
    <td>${a.type}</td>
    <td>${a.weight?a.weight+' kg':'—'}</td>
    <td class="${a.healthStatus==='sick'?'text-bad':''} monospace">${a.healthStatus==='sick'?'39.8°C':'38.4°C'}</td>
    <td>${a.breed||'—'}</td>
    <td><span class="chip ${chipMap[a.healthStatus]||'chip-gray'}">${a.healthStatus}</span></td>
  </tr>`;
}).join('');

const healthRows = healthDue.slice(0,4).map(h=>{
  const days=SF.daysUntil(h.nextDue);
  const animal=SF.getAnimal(h.animalId);
  return `<div class="log-row">
    <div class="log-dot" style="background:${days<=3?'var(--red)':'var(--amber)'}"></div>
    <div>
      <div class="log-msg"><strong>${h.vaccineName||h.recordType}</strong> — ${animal?.name||'Animal '+h.animalId}</div>
      <div class="log-time">Due ${SF.fmtDate(h.nextDue)} · ${days===0?'Today!':days+' days away'}</div>
    </div>
  </div>`;
}).join('') || '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">No upcoming duties</div>';

pc.innerHTML = `
${sick > 0 ? `<div class="alert-bar">
  <span style="font-size:16px">🚨</span>
  <span><strong>${sick} animal${sick>1?'s':''} need attention.</strong> Check health monitor for details.
  <span class="alert-link" onclick="window.location.href='health.html'">View health →</span></span>
</div>` : ''}

<!-- KPIs -->
<div class="kpi-row">
  <div class="kpi" style="--kpi-accent:var(--amber)">
    <div class="kpi-lbl">Total Animals</div>
    <div class="kpi-val">${animals.length}</div>
    <div class="kpi-delta delta-nt">${animals.filter(a=>a.type==='cow').length} cattle · ${animals.filter(a=>a.type==='pig').length} pigs · ${animals.filter(a=>a.type==='poultry').length} poultry</div>
  </div>
  <div class="kpi" style="--kpi-accent:var(--green)">
    <div class="kpi-lbl">Herd Health Rate</div>
    <div class="kpi-val good">${animals.length?Math.round(healthy/animals.length*100):0}%</div>
    <div class="kpi-delta delta-up">${healthy} healthy · ${sick} under care</div>
  </div>
  <div class="kpi" style="--kpi-accent:${sick>0?'var(--red)':'var(--green)'}">
    <div class="kpi-lbl">Active Alerts</div>
    <div class="kpi-val ${sick>0?'bad':'good'}">${sick}</div>
    <div class="kpi-delta ${sick>0?'delta-dn':'delta-up'}">${sick>0?sick+' animal(s) need care':'All clear'}</div>
  </div>
  <div class="kpi" style="--kpi-accent:var(--blue)">
    <div class="kpi-lbl">Net Profit</div>
    <div class="kpi-val ${netProfit>=0?'good':'bad'}">${SF.currency(netProfit)}</div>
    <div class="kpi-delta ${netProfit>=0?'delta-up':'delta-dn'}">Income − Expenses</div>
  </div>
  <div class="kpi" style="--kpi-accent:var(--green)">
    <div class="kpi-lbl">Livestock Value</div>
    <div class="kpi-val">${SF.currency(liveValue)}</div>
    <div class="kpi-delta delta-nt">Current market value</div>
  </div>
</div>

<!-- Main Grid -->
<div class="grid-2">
  <div>
    <!-- Herd Overview Table -->
    <div class="panel">
      <div class="ph">
        <span class="ph-title">Herd Overview</span>
        <div class="ph-actions">
          <span class="ph-meta">${animals.length} animals</span>
          <a href="livestock.html" class="btn btn-sm">View all</a>
          <a href="livestock-add.html" class="btn btn-primary btn-sm">+ Add</a>
        </div>
      </div>
      <table class="tbl">
        <thead><tr><th></th><th>ID / Name</th><th>Type</th><th>Weight</th><th>Temp</th><th>Breed</th><th>Status</th></tr></thead>
        <tbody>${animalRows || '<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3)">No animals yet — <a href="livestock-add.html">add your first</a></td></tr>'}</tbody>
      </table>
    </div>

    <!-- Financial Chart -->
    <div class="panel">
      <div class="ph">
        <span class="ph-title">Financial Overview — 6 Months</span>
        <span class="ph-meta">Income vs Expenses</span>
      </div>
      <div style="padding:14px 16px 10px">
        <canvas id="finChart" height="160"></canvas>
      </div>
    </div>
  </div>

  <div>
    <!-- Weather -->
    <div class="panel">
      <div class="ph"><span class="ph-title">Weather</span><span class="ph-meta">Nigeria · Today</span></div>
      <div class="wx-row">
        <div class="wx-col"><div class="wx-t">NOW</div><div class="wx-i">☀️</div><div class="wx-v">27°C</div><div class="wx-r">0%</div></div>
        <div class="wx-col"><div class="wx-t">15:00</div><div class="wx-i">⛅</div><div class="wx-v">28°C</div><div class="wx-r">5%</div></div>
        <div class="wx-col"><div class="wx-t">18:00</div><div class="wx-i">🌧️</div><div class="wx-v">25°C</div><div class="wx-r">80%</div></div>
        <div class="wx-col"><div class="wx-t">TMRW</div><div class="wx-i">☀️</div><div class="wx-v">29°C</div><div class="wx-r">10%</div></div>
      </div>
      <div class="wx-warn">🌡 Heat stress risk after 14:00 — keep cattle shaded &amp; hydrated</div>
    </div>

    <!-- Feed Inventory -->
    <div class="panel">
      <div class="ph">
        <span class="ph-title">Feed Inventory</span>
        <a href="livestock.html" class="btn btn-sm btn-primary">Manage</a>
      </div>
      <div class="feed-item"><span class="feed-name">Cattle Hay</span><div class="feed-track"><div class="feed-fill" style="width:72%;background:var(--green)"></div></div><span class="feed-pct">72%</span><button class="feed-btn">Order</button></div>
      <div class="feed-item"><span class="feed-name">Pig Pellets</span><div class="feed-track"><div class="feed-fill" style="width:45%;background:var(--amber)"></div></div><span class="feed-pct" style="color:var(--amber)">45%</span><button class="feed-btn">Order</button></div>
      <div class="feed-item"><span class="feed-name">Poultry Mix</span><div class="feed-track"><div class="feed-fill" style="width:18%;background:var(--red)"></div></div><span class="feed-pct" style="color:var(--red)">18% ⚠</span><button class="feed-btn urgent">Urgent</button></div>
      <div class="feed-item"><span class="feed-name">Mineral Lick</span><div class="feed-track"><div class="feed-fill" style="width:60%;background:var(--blue)"></div></div><span class="feed-pct">60%</span><button class="feed-btn">Order</button></div>
      <div class="feed-item"><span class="feed-name">Silage</span><div class="feed-track"><div class="feed-fill" style="width:84%;background:var(--green)"></div></div><span class="feed-pct">84%</span><button class="feed-btn">Order</button></div>
    </div>

    <!-- Upcoming Health -->
    <div class="panel">
      <div class="ph"><span class="ph-title">Upcoming Health Duties</span><a href="health.html" class="btn btn-sm">View all</a></div>
      ${healthRows}
    </div>

    <!-- Activity Log -->
    <div class="panel">
      <div class="ph"><span class="ph-title">Activity Log</span><span class="ph-meta">Today</span></div>
      ${sick > 0 ? `<div class="log-row"><div class="log-dot" style="background:var(--red)"></div><div><div class="log-msg">Animal health alert — ${sick} under care. Vet notified.</div><div class="log-time">09:14 today</div></div></div>` : ''}
      <div class="log-row"><div class="log-dot" style="background:var(--amber)"></div><div><div class="log-msg">Morning feed complete — all barns dispensed</div><div class="log-time">08:30 today</div></div></div>
      <div class="log-row"><div class="log-dot" style="background:var(--green)"></div><div><div class="log-msg">Sensor health check — all systems online</div><div class="log-time">07:00 today</div></div></div>
      <div class="log-row"><div class="log-dot" style="background:var(--blue)"></div><div><div class="log-msg">Daily farm report generated successfully</div><div class="log-time">06:00 today</div></div></div>
    </div>
  </div>
</div>
`;

// Chart
new Chart(document.getElementById('finChart').getContext('2d'),{
  type:'bar',
  data:{labels:mLabels,datasets:[
    {label:'Income',data:mInc,backgroundColor:'rgba(45,122,58,.75)',borderRadius:5,borderSkipped:false},
    {label:'Expense',data:mExp,backgroundColor:'rgba(168,48,48,.6)',borderRadius:5,borderSkipped:false}
  ]},
  options:{responsive:true,plugins:{legend:{position:'top',labels:{font:{family:'IBM Plex Mono',size:10}}}},
    scales:{y:{beginAtZero:true,ticks:{callback:v=>'₦'+v.toLocaleString(),font:{family:'IBM Plex Mono',size:10}}},x:{grid:{display:false},ticks:{font:{family:'IBM Plex Mono',size:10}}}}}
});
</script>
</body>
</html>

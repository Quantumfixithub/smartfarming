<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Herd — SmartFarm</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="shell">
<div id="app-shell"></div>
<script src="assets/js/app.js"></script>
<script src="assets/js/nav.js"></script>
<script>
SF.requireLogin();
buildShell('Herd Management','livestock');
const pc=document.getElementById('page-content');

function render(search='',typeF='',healthF=''){
  let animals=SF.getAnimals().filter(a=>a.isActive!==false);
  if(typeF)   animals=animals.filter(a=>a.type===typeF);
  if(healthF) animals=animals.filter(a=>a.healthStatus===healthF);
  if(search)  animals=animals.filter(a=>(a.name||'').toLowerCase().includes(search)||(a.tagId||'').toLowerCase().includes(search)||(a.breed||'').toLowerCase().includes(search));

  const all=SF.getAnimals().filter(a=>a.isActive!==false);
  const cattle  =all.filter(a=>a.type==='cow').length;
  const pigs    =all.filter(a=>a.type==='pig').length;
  const poultry =all.filter(a=>a.type==='poultry').length;
  const sick    =all.filter(a=>a.healthStatus==='sick').length;
  const totalVal=all.reduce((s,a)=>s+(+a.currentValue||0),0);

  const chipMap={healthy:'chip-ok',sick:'chip-bad',recovering:'chip-warn',deceased:'chip-bad'};

  pc.innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div>
      <h2 style="font-size:18px;font-weight:800">Herd Management</h2>
      <p class="text-muted" style="font-size:12px;margin-top:2px">${all.length} registered animals · ${SF.currency(totalVal)} total value</p>
    </div>
    <a href="livestock-add.html" class="btn btn-primary">+ Register Animal</a>
  </div>

  <div class="kpi-row cols-4" style="margin-bottom:16px">
    <div class="kpi" style="--kpi-accent:var(--amber)"><div class="kpi-lbl">Cattle</div><div class="kpi-val">${cattle}</div><div class="kpi-delta delta-nt">Cows &amp; Bulls</div></div>
    <div class="kpi" style="--kpi-accent:var(--green)"><div class="kpi-lbl">Pigs</div><div class="kpi-val">${pigs}</div><div class="kpi-delta delta-nt">All pens</div></div>
    <div class="kpi" style="--kpi-accent:var(--blue)"><div class="kpi-lbl">Poultry</div><div class="kpi-val">${poultry}</div><div class="kpi-delta delta-nt">All flocks</div></div>
    <div class="kpi" style="--kpi-accent:${sick>0?'var(--red)':'var(--green)'}"><div class="kpi-lbl">Under Care</div><div class="kpi-val ${sick>0?'bad':'good'}">${sick}</div><div class="kpi-delta ${sick>0?'delta-dn':'delta-up'}">${sick>0?'Need attention':'All healthy'}</div></div>
  </div>

  <!-- Filters -->
  <div class="panel" style="margin-bottom:14px">
    <div style="padding:12px 16px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div class="form-group" style="flex:1;min-width:160px">
        <label class="form-label">Search</label>
        <input type="text" id="search" class="form-input" placeholder="Tag ID, name, breed…" value="${search}" oninput="applyFilters()">
      </div>
      <div class="form-group" style="width:140px">
        <label class="form-label">Type</label>
        <select id="typeF" class="form-select" onchange="applyFilters()">
          <option value="">All Types</option>
          ${['cow','goat','poultry','sheep','pig','other'].map(t=>`<option value="${t}" ${typeF===t?'selected':''}>${SF.animalIcon(t)} ${t}</option>`).join('')}
        </select>
      </div>
      <div class="form-group" style="width:140px">
        <label class="form-label">Health</label>
        <select id="healthF" class="form-select" onchange="applyFilters()">
          <option value="">All Status</option>
          <option value="healthy" ${healthF==='healthy'?'selected':''}>✅ Healthy</option>
          <option value="sick"    ${healthF==='sick'?'selected':''}>🚨 Sick</option>
          <option value="recovering" ${healthF==='recovering'?'selected':''}>💊 Recovering</option>
        </select>
      </div>
      <button onclick="render()" class="btn btn-sm">Clear</button>
    </div>
  </div>

  <!-- Table -->
  <div class="panel">
    <div class="ph">
      <span class="ph-title">Animal Register</span>
      <div class="ph-actions">
        <span class="ph-meta">${animals.length} result${animals.length!==1?'s':''}</span>
        <button class="btn btn-sm">Export CSV</button>
      </div>
    </div>
    ${!animals.length ? `<div class="empty"><div class="empty-ico">${SF.animalIcon('cow')}</div><h3>No Animals Found</h3><p>Try clearing filters or add your first animal.</p><a href="livestock-add.html" class="btn btn-primary">+ Register Animal</a></div>` :
    `<div style="overflow-x:auto">
    <table class="tbl">
      <thead><tr><th></th><th>Tag ID</th><th>Name</th><th>Species</th><th>Breed</th><th>Gender</th><th>Age</th><th>Weight</th><th>Value</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        ${animals.map(a=>{
          const dob=a.dob?new Date(a.dob):null;
          const ageStr=dob?Math.floor((new Date()-dob)/31536000000)+'yr':'—';
          return `<tr>
            <td><div class="animal-ico">${SF.animalIcon(a.type)}</div></td>
            <td class="monospace"><strong>${a.tagId}</strong></td>
            <td>${a.name||'—'}</td>
            <td style="text-transform:capitalize">${a.type}</td>
            <td>${a.breed||'—'}</td>
            <td>${a.gender==='female'?'♀ F':'♂ M'}</td>
            <td class="monospace">${ageStr}</td>
            <td class="monospace">${a.weight?a.weight+' kg':'—'}</td>
            <td class="monospace">${a.currentValue?SF.currency(a.currentValue):'—'}</td>
            <td><span class="chip ${chipMap[a.healthStatus]||'chip-gray'}">${a.healthStatus}</span></td>
            <td>
              <div style="display:flex;gap:5px">
                <a href="livestock-view.html?id=${a.id}" class="btn btn-sm">View</a>
                <a href="livestock-edit.html?id=${a.id}" class="btn btn-sm">Edit</a>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>`}
  </div>

  <!-- Quick Actions -->
  <div class="panel" style="margin-top:14px">
    <div class="ph"><span class="ph-title">Quick Actions</span></div>
    <div class="action-grid">
      <a href="livestock-add.html" class="abtn"><span class="abtn-ico">🐄</span><span class="abtn-lbl">Register Animal</span><span class="abtn-desc">Add new livestock to herd</span></a>
      <a href="health.html" class="abtn"><span class="abtn-ico">💉</span><span class="abtn-lbl">Health Records</span><span class="abtn-desc">Vaccinations &amp; treatment log</span></a>
      <a href="executive.html" class="abtn"><span class="abtn-ico">📊</span><span class="abtn-lbl">Analytics</span><span class="abtn-desc">Weight gain &amp; production trends</span></a>
      <a href="transactions.html" class="abtn"><span class="abtn-ico">₦</span><span class="abtn-lbl">Financials</span><span class="abtn-desc">Income &amp; expense tracker</span></a>
    </div>
  </div>
  `;
}

function applyFilters(){
  render(
    document.getElementById('search')?.value.toLowerCase()||'',
    document.getElementById('typeF')?.value||'',
    document.getElementById('healthF')?.value||''
  );
}
window.applyFilters=applyFilters;
render();
</script>
</body>
</html>

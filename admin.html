<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module Manager — SmartFarm</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="shell">
  <div id="app-shell"></div>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/nav.js"></script>
  <script>
  SF.requireLogin();
  buildNav('Module Manager', 'admin');

  const pc = document.getElementById('page-content');
  const icons = { livestock:'🐄', crops:'🌾', executive:'📊' };
  const prices = { livestock:'₦5,000/mo', crops:'₦5,000/mo', executive:'₦30,000/mo' };
  const descs = {
    livestock: 'Individual animal tracking, health records, feed logs, QR codes.',
    crops:     'Plot tracking, inputs, harvest recording, yield analytics.',
    executive: 'Combined KPIs, ROI, mortality rate, financial trend charts.'
  };

  function render() {
    const mods = SF.getModules();
    pc.innerHTML = `
    <div style="max-width:700px;margin:0 auto">
      <div style="margin-bottom:24px">
        <h2 style="font-size:22px;font-weight:800">⚙ Module Manager</h2>
        <p style="color:var(--gray-400);font-size:13px;margin-top:4px">Enable or disable feature modules</p>
      </div>

      <div style="display:flex;flex-direction:column;gap:14px">
        ${mods.map(m=>`
        <div class="card" style="padding:20px">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
            <div style="display:flex;align-items:center;gap:14px">
              <div style="width:48px;height:48px;background:var(--green-50);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px">${icons[m.slug]||'🔧'}</div>
              <div>
                <div style="font-weight:800;font-size:15px;color:var(--gray-800)">${m.name} Management</div>
                <div style="font-size:12px;color:var(--gray-400);margin-top:2px">${descs[m.slug]||''}</div>
                <div style="font-size:11px;color:var(--green-600);margin-top:3px;font-weight:700">${prices[m.slug]||''}</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <span class="badge ${m.active?'badge-green':'badge-gray'}">${m.active?'✅ Active':'❌ Inactive'}</span>
              <button onclick="toggleMod('${m.slug}')" class="btn ${m.active?'btn-danger':'btn-primary'} btn-sm">
                ${m.active?'Disable':'Enable'}
              </button>
            </div>
          </div>
        </div>`).join('')}
      </div>

      <div class="alert alert-info" style="margin-top:18px">
        ⚠ Disabling a module hides it from navigation. All data is preserved and can be re-enabled anytime.
      </div>
    </div>
    `;
  }

  function toggleMod(slug) {
    SF.toggleModule(slug);
    SF.toast('Module updated!');
    render();
    // Rebuild nav to reflect changes
    buildNav('Module Manager', 'admin');
  }

  render();
  </script>
</body>
</html>
